
[package]
name = "image-fuzz"
version = "0.0.1"
authors = ["Automatically generated"]
edition = "2021"
publish = false

[package.metadata]
cargo-fuzz = true

[dependencies]
image = { git = "https://github.com/image-rs/image", rev = "cf89a940096d7bfdf64899d99cbb4010acb38d2c", default-features = false }

[dependencies.image-extras]
path = ".."
features = ["xbm", "xpm"]
[dependencies.libfuzzer-sys]
version = "0.4"

# Prevent this from interfering with workspaces
[workspace]
members = ["."]

[[bin]]
name = "fuzzer_script_icns"
path = "fuzzers/fuzzer_script_icns.rs"

[[bin]]
name = "fuzzer_script_ora"
path = "fuzzers/fuzzer_script_ora.rs"

[[bin]]
name = "fuzzer_script_pcx"
path = "fuzzers/fuzzer_script_pcx.rs"

[[bin]]
name = "fuzzer_script_sgi"
path = "fuzzers/fuzzer_script_sgi.rs"

[[bin]]
name = "fuzzer_script_xbm"
path = "fuzzers/fuzzer_script_xbm.rs"

[[bin]]
name = "fuzzer_script_xpm"
path = "fuzzers/fuzzer_script_xpm.rs"
